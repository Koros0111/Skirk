name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build CLI Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build release archives
        run: VERSION="${GITHUB_REF_NAME}" scripts/package_release.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/skirk-*.tar.gz dist/skirk-*.zip dist/SHA256SUMS --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/skirk-*.tar.gz dist/skirk-*.zip dist/SHA256SUMS --title "${GITHUB_REF_NAME}" --generate-notes
          fi

  android:
    name: Build Android Client
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build installable preview APK
        working-directory: clients/android
        run: ./gradlew :app:assembleDebug --console=plain

      - name: Prepare Android release assets
        run: |
          mkdir -p dist
          cp clients/android/app/build/outputs/apk/debug/app-debug.apk dist/skirk-android-arm64-preview.apk
          (cd dist && sha256sum skirk-android-arm64-preview.apk > skirk-android-arm64-preview.apk.sha256)

      - name: Upload Android release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/skirk-android-arm64-preview.apk dist/skirk-android-arm64-preview.apk.sha256 --clobber

  windows-desktop:
    name: Build Windows Desktop Client
    runs-on: windows-latest
    needs: release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Skirk Windows sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force clients/desktop/src-tauri/resources/sidecars/windows | Out-Null
          go build -trimpath -o clients/desktop/src-tauri/resources/sidecars/windows/skirk.exe ./cmd/skirk

      - name: Build Tauri desktop app
        working-directory: clients/desktop
        run: |
          npm ci
          npm run tauri build -- --bundles nsis

      - name: Build portable zip
        run: python clients/desktop/scripts/package_windows_portable.py

      - name: Prepare Windows release checksums
        shell: pwsh
        run: |
          $zip = "dist/windows-portable/Skirk_windows_x64_portable.zip"
          $installer = Get-ChildItem "clients/desktop/src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          Copy-Item $installer.FullName "dist/skirk-desktop-windows-x64-installer.exe"
          $files = @($zip, "dist/skirk-desktop-windows-x64-installer.exe")
          foreach ($file in $files) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $(Split-Path $file -Leaf)" | Set-Content "$file.sha256"
          }

      - name: Upload Windows desktop release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload "${env:GITHUB_REF_NAME}" `
            dist/windows-portable/Skirk_windows_x64_portable.zip `
            dist/windows-portable/Skirk_windows_x64_portable.zip.sha256 `
            dist/skirk-desktop-windows-x64-installer.exe `
            dist/skirk-desktop-windows-x64-installer.exe.sha256 `
            --clobber
